<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Canvas Browser</title>
  <link rel="stylesheet" href="canvas.css">
</head>
<body>

  <header id="toolbar">
    <span id="logo">&#9635; Canvas Browser</span>

    <button id="btn-add" class="tb-btn primary" title="Neues Panel (Strg+N)">+ Panel</button>

    <div class="tb-sep"></div>

    <button id="btn-pan" class="tb-btn tool" title="Hand-Werkzeug zum Bewegen (oder Leertaste halten)">
      &#9997; Hand
    </button>

    <div class="tb-sep"></div>

    <button id="btn-add-text"  class="tb-btn tool" title="Textfeld hinzufügen">T Text</button>
    <button id="btn-add-image" class="tb-btn tool" title="Bild hinzufügen (auch Drag&amp;Drop / Einfügen)">&#128444; Bild</button>
    <button id="btn-add-file"  class="tb-btn tool" title="Datei hinzufügen (auch Drag&amp;Drop)">&#128206; Datei</button>
    <input id="image-input" type="file" accept="image/*" style="display:none">
    <input id="file-input"  type="file" accept="image/*,application/pdf,.doc,.docx,.xls,.xlsx,.txt" style="display:none">

    <div class="tb-sep"></div>

    <button id="btn-zoom-out" class="tb-btn tool icon-btn" title="Verkleinern">&#128269;&#8722;</button>
    <button id="btn-zoom-reset" class="tb-btn tool" title="Zoom zurücksetzen (Strg+0)">100%</button>
    <button id="btn-zoom-in"  class="tb-btn tool icon-btn" title="Vergrößern">&#128269;+</button>

    <div class="tb-sep"></div>

    <button id="btn-navigator" class="tb-btn tool" title="Navigator ein-/ausblenden">&#9783; Navigator</button>

    <div class="tb-sep"></div>

    <button id="btn-clear-all" class="tb-btn danger" title="Alle Panels entfernen">Alle löschen</button>

    <span id="panel-count">0 Panels</span>

    <div id="toolbar-right">
      <span id="bridge-status" title="Bridge: prüfe…">
        <span id="bridge-dot"></span>
        <span id="bridge-label">Bridge</span>
      </span>
      <span class="tb-right-sep">|</span>
      <kbd>Leertaste</kbd>+Drag = Bewegen &nbsp;|&nbsp;
      <kbd>Mausrad</kbd> = Zoom &nbsp;|&nbsp;
      <kbd>Strg+N</kbd> = Panel
    </div>
  </header>

  <div id="viewport">
    <div id="canvas-area"></div>
  </div>

  <!-- Kachelansicht-Badge (schwebt mittig über den Panels) -->
  <div id="tile-badge" class="tile-badge-hidden">
    <span>&#10697; Kachelansicht aktiv</span>
    <button id="tile-exit-btn">&#215; Beenden</button>
  </div>

  <!-- Vollbild-Overlay (außerhalb des transform-Canvas) -->
  <div id="fs-overlay" class="fs-hidden">
    <div id="fs-bar">
      <span id="fs-title"></span>
      <button id="fs-exit" title="Vollbild beenden (Esc)">&#215; Vollbild beenden</button>
    </div>
    <div id="fs-content"></div>
  </div>

  <!-- Navigator-Seitenleiste -->
  <div id="navigator" class="nav-hidden">
    <div id="nav-header">
      <span>Navigator</span>
      <button id="nav-close" title="Schlie&#223;en">&#215;</button>
    </div>
    <div id="nav-actions" class="nav-actions-hidden">
      <button id="nav-tile-btn">&#10697; Kacheln</button>
      <button id="nav-fs-multi-btn">&#9974; Vollbild</button>
      <button id="nav-deselect-btn">&#215; Auswahl</button>
    </div>
    <div id="nav-list"></div>
  </div>

  <script src="canvas.js"></script>
</body>
</html>
